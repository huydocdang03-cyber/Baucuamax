<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bầu Cua VIP</title>

<style>

/* FIX UI GLOBAL */
html, body {
  margin:0;
  padding:0;
  font-family:Arial;
  background:url("https://i.imgur.com/3ZQ3Z6K.jpg") center/cover no-repeat;
  color:white;
  font-size:16px;
}

*{
  box-sizing:border-box;
}

/* LOGIN */
#loginBox{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
}

.login-box{
background:rgba(0,0,0,0.85);
padding:25px;
border-radius:15px;
text-align:center;
width:90%;
max-width:300px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:5px;
background:gold;
cursor:pointer;
width:100%;
margin-top:5px;
font-weight:bold;
}

/* GAME */
#game{
display:none;
padding:10px;
max-width:500px;
margin:auto;
}

/* TEXT SIZE FIX */
h2{font-size:20px;}
h3{font-size:16px;}

.panel{
background:rgba(0,0,0,0.75);
padding:10px;
margin:10px 0;
border-radius:10px;
}

/* BOARD */
#board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.cell{
background:rgba(255,255,255,0.15);
padding:15px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.cell:hover{
background:rgba(255,255,255,0.3);
}

/* BUTTON GROUP */
.row{
display:flex;
gap:5px;
}

.row button{
flex:1;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-box">
<h2>🎲 B
