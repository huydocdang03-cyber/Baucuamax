<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bầu Cua VIP</title>
<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}
#loginBox{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.login-box{
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}
input,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}
button{background:gold;}
#game{
display:none;
padding:10px;
max-width:500px;
margin:auto;
}
.panel{
background:#222;
padding:10px;
margin:10px 0;
border-radius:10px;
}
.user-item{
display:flex;
justify-content:space-between;
margin:5px 0;
}
</style>
</head>
<body>

<div id="loginBox">
<div class="login-box">
<h2>🎲 Đăng nhập</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="doLogin()">Login</button>
<p id="err"></p>
</div>
</div>

<div id="game">
<h2 id="dealer">👑 Dealer: None</h2>
<h3 id="money">💰 0</h3>
<h2 id="dice">🎲 🎲 🎲</h2>

<div id="adminPanel" class="panel" style="display:none;">
<h3>Admin</h3>
<input id="adminResult" placeholder="Bầu,Cua,Tôm">
<button onclick="setResult()">Set kết quả</button>
<p id="preview"></p>
</div>

<div id="bankerPanel" class="panel" style="display:none;">
<h3>Banker</h3>
<div id="userList"></div>
<input id="selectedUser" placeholder="User">
<input id="chip" placeholder="Chip">
<button onclick="add()">Cộng chip</button>
<button onclick="sub()">Trừ chip</button>
<div id="dealerList"></div>
</div>

<div id="dealerPanel" class="panel" style="display:none;">
<h3>Dealer</h3>
<button onclick="openResult()">Mở kết quả</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function doLogin(){
socket.emit("login", {
username: username.value,
password: password.value
});
}

socket.on("login_success", (d)=>{
loginBox.style.display="none";
game.style.display="block";
money.innerText="💰 "+d.money;

if(d.role==="admin") adminPanel.style.display="block";
if(d.role==="banker") bankerPanel.style.display="block";
if(d.role==="dealer") dealerPanel.style.display="block";
});

socket.on("login_error", (msg)=>{
err.innerText = msg;
});

socket.on("users", (u)=>{
let html="";
let dealerHTML="";

for(let id in u){
let name = u[id].username;

html += `
<div class="user-item">
${name} (${u[id].money})
<button onclick="selectedUser.value='${name}'">Chọn</button>
</div>`;

dealerHTML += `
<div class="user-item">
${name}
<button onclick="setDealer('${name}')">Dealer</button>
</div>`;
}

userList.innerHTML = html;
dealerList.innerHTML = dealerHTML;
});

socket.on("dealer", (d)=>{
dealer.innerText = "👑 Dealer: " + d;
});

socket.on("dice_result", (r)=>{
dice.innerText = "🎲 " + r;
});

socket.on("admin_result", (r)=>{
preview.innerText = "🎯 " + r.join(" - ");
});

function add(){
socket.emit("add_chip",{user:selectedUser.value,chip:+chip.value});
}
function sub(){
socket.emit("sub_chip",{user:selectedUser.value,chip:+chip.value});
}
function setDealer(name){
socket.emit("set_dealer",name);
}
function setResult(){
socket.emit("admin_set",adminResult.value);
}
function openResult(){
socket.emit("open_result");
}
</script>

</body>
</html>
